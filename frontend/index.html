<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Search Tool</title>
  <style>
    body { font-family: system-ui, Arial; max-width: 920px; margin: 24px auto; padding: 0 12px; }
    textarea, input, select { width: 100%; padding: 10px; margin: 6px 0 12px; }
    button { padding: 10px 14px; cursor: pointer; }
    pre { white-space: pre-wrap; background: #f6f6f6; padding: 12px; border-radius: 8px; }
    .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 800px){ .row{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <h1>AI Search Tool (Internal)</h1>

  <label>Câu hỏi</label>
  <textarea id="q" rows="3">5 loại xe được nhiều người ưa chuộng nhất</textarea>

  <div class="row">
    <div>
      <label>Số nguồn (5–200)</label>
      <input id="n" type="number" value="50" min="5" max="200" />
    </div>
    <div>
      <label>Top K</label>
      <input id="k" type="number" value="5" min="3" max="50" />
    </div>
    <div>
      <label>Engine</label>
      <select id="engine">
        <option value="google_light" selected>google_light</option>
        <option value="google">google</option>
      </select>
    </div>
  </div>

  <button id="run">Chạy</button>

  <h2>Kết quả</h2>
  <pre id="out">---</pre>

  <h2>Nguồn (top 20)</h2>
  <pre id="src">---</pre>

<script>
const API = "http://localhost:8000";

document.getElementById("run").onclick = async () => {
  const query = document.getElementById("q").value.trim();
  const n_sources = Number(document.getElementById("n").value);
  const top_k = Number(document.getElementById("k").value);
  const engine = document.getElementById("engine").value;

  document.getElementById("out").textContent = "Đang chạy...";
  document.getElementById("src").textContent = "";

  const res = await fetch(API + "/run", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ query, n_sources, top_k, engine, language:"vi", country:"vn" })
  });

  const data = await res.json();
  document.getElementById("out").textContent = data.answer || JSON.stringify(data, null, 2);

  const top = (data.sources || []).slice(0, 20).map(s =>
    `- ${s.ok ? "✅" : "❌"} ${s.title}\n  ${s.url}\n  ${s.snippet || ""}`
  ).join("\n\n");
  document.getElementById("src").textContent = top || "---";
};
</script>
</body>
</html>

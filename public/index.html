<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon AI Search Table</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero card">
        <p class="badge">FREE BROWSER TOOL</p>
        <h1>AI Search bảng thống kê đa website</h1>
        <p class="subtitle">
          Nhập từ khóa, chọn số website cần thu thập, AI tổng hợp thành bảng:
          tên, địa chỉ, học phí, đường link.
        </p>
      </section>

      <section class="card">
        <form id="search-form" class="form-grid">
          <label class="field field-full">
            <span>Từ khóa cần tìm</span>
            <textarea
              id="query"
              rows="3"
              placeholder='Ví dụ: "top 5 trường tiểu học có học phí rẻ nhất HCM"'
              required
            ></textarea>
          </label>

          <label class="field">
            <span>Số website cần thu thập (x)</span>
            <input id="target-sites" type="number" min="5" max="60" value="20" />
          </label>

          <label class="field">
            <span>Số dòng kết quả muốn lấy (top k)</span>
            <input id="top-k" type="number" min="1" max="20" value="5" />
          </label>

          <div class="field">
            <span>Search engines</span>
            <div class="chips">
              <label class="chip"><input type="checkbox" value="google" checked />Google</label>
              <label class="chip"><input type="checkbox" value="bing" checked />Bing</label>
              <label class="chip"><input type="checkbox" value="duckduckgo" />DuckDuckGo</label>
              <label class="chip"><input type="checkbox" value="yahoo" />Yahoo</label>
            </div>
          </div>

          <div class="actions field-full">
            <button id="run-btn" type="submit">Phân tích ngay</button>
            <p id="status" aria-live="polite"></p>
          </div>
        </form>
      </section>

      <section class="card" id="result-card">
        <h2>Kết quả phân tích</h2>
        <p id="summary" class="summary">Chưa có dữ liệu.</p>
        <div class="table-wrap">
          <table id="result-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Tên</th>
                <th>Địa chỉ</th>
                <th>Học phí</th>
                <th>Link</th>
                <th>Ghi chú</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="6" class="empty">Nhập từ khóa để bắt đầu.</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p id="assumptions" class="assumptions"></p>
      </section>

      <section class="card">
        <h2>Nguồn đã thu thập</h2>
        <ol id="sources" class="sources"></ol>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>

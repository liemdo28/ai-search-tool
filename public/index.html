<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Search</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <h1><span class="icon">⚡</span> AI SEARCH</h1>
        <p>Thu thập • Phân tích • Tổng hợp thông minh từ nhiều nguồn</p>
      </header>

      <section class="search-card">
        <form id="search-form" class="search-form">
          <div class="row">
            <label class="field grow">
              <span>Câu hỏi / Từ khóa</span>
              <textarea
                id="query"
                rows="2"
                placeholder='Ví dụ: "top 5 trường tiểu học học phí rẻ nhất HCM"'
                required
              ></textarea>
            </label>
            <label class="field small">
              <span>Số nguồn (1-60)</span>
              <input id="target-sites" type="number" min="1" max="60" value="20" />
            </label>
          </div>

          <button id="run-btn" type="submit" class="search-btn">🔎 TÌM KIẾM</button>
          <p id="status" aria-live="polite"></p>
        </form>
      </section>

      <section class="result-card" id="result-card">
        <h2>Kết quả phân tích</h2>
        <p id="summary" class="summary">Chưa có dữ liệu.</p>
        <div class="table-wrap">
          <table id="result-table">
            <thead></thead>
            <tbody>
              <tr>
                <td colspan="1" class="empty">Nhập từ khóa để bắt đầu.</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p id="assumptions" class="assumptions"></p>
      </section>

      <section class="result-card">
        <h2>Nguồn tham khảo</h2>
        <ol id="sources" class="sources"></ol>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>

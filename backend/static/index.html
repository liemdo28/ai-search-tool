<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Search Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-5xl mx-auto p-6">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-semibold">AI Search Tool</h1>
      <span class="text-sm text-slate-500">Internal</span>
    </div>

    <div class="bg-white rounded-2xl shadow p-5 border border-slate-100">
      <label class="text-sm font-medium">Câu hỏi</label>
      <textarea id="q" rows="3"
        class="mt-2 w-full rounded-xl border border-slate-200 p-3 focus:outline-none focus:ring-2 focus:ring-slate-300"
        placeholder="Ví dụ: 5 loại xe được nhiều người ưa chuộng nhất"></textarea>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
        <div>
          <label class="text-sm font-medium">Số nguồn (5–200)</label>
          <input id="n" type="number" value="50" min="5" max="200"
            class="mt-2 w-full rounded-xl border border-slate-200 p-3" />
        </div>
        <div>
          <label class="text-sm font-medium">Top K</label>
          <input id="k" type="number" value="5" min="3" max="50"
            class="mt-2 w-full rounded-xl border border-slate-200 p-3" />
        </div>
        <div>
          <label class="text-sm font-medium">Engine</label>
          <select id="engine" class="mt-2 w-full rounded-xl border border-slate-200 p-3">
            <option value="google_light" selected>google_light</option>
            <option value="google">google</option>
          </select>
        </div>
      </div>

      <div class="flex items-center gap-3 mt-4">
        <button id="run"
          class="rounded-xl bg-slate-900 text-white px-4 py-2 hover:bg-slate-800 active:scale-[0.99]">
          Chạy
        </button>
        <div id="status" class="text-sm text-slate-500"></div>
      </div>
    </div>

    <div class="mt-6 grid grid-cols-1 gap-6">
      <div class="bg-white rounded-2xl shadow p-5 border border-slate-100">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold">Kết quả</h2>
          <button id="copy"
            class="text-sm px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50">
            Copy
          </button>
        </div>
        <pre id="out" class="mt-3 whitespace-pre-wrap text-sm leading-6 text-slate-800">—</pre>
      </div>

      <div class="bg-white rounded-2xl shadow p-5 border border-slate-100">
        <h2 class="text-lg font-semibold">Nguồn</h2>
        <div id="src" class="mt-3 space-y-3 text-sm">—</div>
      </div>
    </div>
  </div>

<script>
document.getElementById("run").onclick = async () => {
  const query = document.getElementById("q").value.trim();
  const n_sources = Number(document.getElementById("n").value);
  const top_k = Number(document.getElementById("k").value);
  const engine = document.getElementById("engine").value;

  document.getElementById("status").textContent = "Đang chạy…";
  document.getElementById("out").textContent = "Đang tổng hợp…";
  document.getElementById("src").innerHTML = "";

  const res = await fetch("/run", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ query, n_sources, top_k, engine, language:"vi", country:"vn" })
  });

  const data = await res.json();
  document.getElementById("out").textContent = data.answer || JSON.stringify(data, null, 2);
  document.getElementById("status").textContent = "Xong";

  const sources = (data.sources || []).slice(0, 30);
  if (!sources.length) {
    document.getElementById("src").textContent = "—";
    return;
  }

  document.getElementById("src").innerHTML = sources.map(s => `
    <div class="rounded-xl border border-slate-200 p-3">
      <div class="flex items-start justify-between gap-3">
        <a class="font-medium hover:underline" href="${s.url}" target="_blank" rel="noreferrer">${s.title || s.url}</a>
        <span class="text-xs ${s.ok ? 'text-emerald-600' : 'text-rose-600'}">${s.ok ? 'OK' : 'FAIL'}</span>
      </div>
      <div class="text-slate-600 mt-1">${(s.snippet || "").replaceAll("<","&lt;")}</div>
      ${s.error ? `<div class="text-xs text-rose-600 mt-2">${s.error}</div>` : ""}
    </div>
  `).join("");
};

document.getElementById("copy").onclick = async () => {
  await navigator.clipboard.writeText(document.getElementById("out").textContent);
  document.getElementById("status").textContent = "Đã copy";
};
</script>
</body>
</html>
